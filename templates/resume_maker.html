<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>AI Resume Maker | InfraBuild AI</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <style>
      body {
        margin: 0;
        font-family: "Inter", sans-serif;
        background: #090b14;
        color: white;
        height: 100vh;
        display: flex;
        flex-direction: column;
      }
      .navbar {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 20px 5%;
        background: rgba(255, 255, 255, 0.03);
        backdrop-filter: blur(10px);
        border-bottom: 1px solid rgba(255,255,255,0.1);
      }
      .navbar .logo {
        font-weight: 700;
        font-size: 20px;
        background: linear-gradient(135deg, #00eaff, #6a5cff);
        -webkit-background-clip: text;
        background-clip: text;
        -webkit-text-fill-color: transparent;
      }
      .back-btn {
        background: rgba(255, 255, 255, 0.1);
        color: white;
        text-decoration: none;
        padding: 8px 16px;
        border-radius: 8px;
        font-size: 14px;
        border: 1px solid rgba(255,255,255,0.2);
        transition: 0.3s;
      }
      .back-btn:hover { background: rgba(255,255,255,0.2); }

      .container {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        flex-grow: 1;
        text-align: center;
        padding: 20px;
      }
      .coming-soon-card {
        background: rgba(255, 255, 255, 0.03);
        border: 1px solid rgba(255,255,255,0.08);
        border-radius: 20px;
        padding: 60px 40px;
        max-width: 600px;
        width: 100%;
        box-shadow: 0 15px 30px rgba(0,0,0,0.4);
      }
      .icon-container {
        width: 80px;
        height: 80px;
        background: rgba(106, 92, 255, 0.1);
        color: #6a5cff;
        border-radius: 20px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 36px;
        margin: 0 auto 20px;
      }
      h1 { margin: 0 0 15px 0; font-size: 28px; }
      p { color: #aaa; line-height: 1.6; font-size: 16px; margin: 0; }
    </style>
  </head>
  <body>
    <header class="navbar">
      <div class="logo"><i class="fa-solid fa-file-pen"></i> AI Resume Maker</div>
      <a href="{{ url_for('dashboard') }}" class="back-btn"><i class="fa-solid fa-arrow-left"></i> Back to Dashboard</a>
    </header>

    <div class="container">
      <div class="coming-soon-card">
        <div class="icon-container"><i class="fa-solid fa-wand-magic-sparkles"></i></div>
        <h1>AI Resume Maker</h1>
        <p>Our intelligent resume builder is currently under development. Soon, you will be able to generate highly optimized, ATS-friendly resumes tailored specifically to matching job requirements using advanced AI generation.</p>
      </div>
    </div>
  </body>
</html>
