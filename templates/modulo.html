<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Platform Modules | Inferno AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
      :root {
        --glass-bg: rgba(255, 255, 255, 0.03);
        --glass-border: rgba(255, 255, 255, 0.1);
        --glow-indigo: rgba(99, 102, 241, 0.4);
      }

      * { box-sizing: border-box; }

      html, body {
        margin: 0;
        padding: 0;
        width: 100%;
        min-height: 100vh;
        font-family: "Inter", sans-serif;
      }

      body {
        background: radial-gradient(circle at 30% 20%, #1e1b4b 0%, #0f172a 40%, #020617 100%);
        color: #e2e8f0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: flex-start;
        padding: 40px 24px 60px;
        overflow-x: hidden;
      }

      /* Animated background particles */
      .bg-orb {
        position: fixed;
        border-radius: 50%;
        filter: blur(80px);
        pointer-events: none;
        z-index: 0;
        animation: float-orb 8s ease-in-out infinite;
      }
      .orb1 { width: 400px; height: 400px; background: rgba(99,102,241,0.15); top: -100px; left: -100px; }
      .orb2 { width: 300px; height: 300px; background: rgba(192,132,252,0.1); bottom: -50px; right: -50px; animation-delay: -4s; }
      .orb3 { width: 200px; height: 200px; background: rgba(251,113,133,0.08); top: 50%; left: 50%; animation-delay: -2s; }

      @keyframes float-orb {
        0%, 100% { transform: translate(0, 0) scale(1); }
        50% { transform: translate(20px, -20px) scale(1.05); }
      }

      /* Navigation bar */
      .top-nav {
        width: 100%;
        max-width: 1100px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 48px;
        position: relative;
        z-index: 10;
      }
      .nav-logo {
        font-size: 1.1rem;
        font-weight: 700;
        background: linear-gradient(to right, #818cf8, #c084fc);
        -webkit-background-clip: text;
        background-clip: text;
        color: transparent;
      }
      .nav-back {
        display: flex;
        align-items: center;
        gap: 6px;
        padding: 8px 16px;
        background: rgba(255,255,255,0.04);
        border: 1px solid rgba(255,255,255,0.1);
        border-radius: 8px;
        color: #94a3b8;
        text-decoration: none;
        font-size: 0.85rem;
        transition: all 0.2s;
      }
      .nav-back:hover { background: rgba(255,255,255,0.08); color: #e2e8f0; }

      /* Glassmorphism */
      .glass-panel {
        backdrop-filter: blur(16px) saturate(180%);
        -webkit-backdrop-filter: blur(16px) saturate(180%);
        background: var(--glass-bg);
        border: 1px solid var(--glass-border);
      }

      /* Shimmer */
      .shimmer {
        position: absolute;
        top: 0; left: -100%;
        width: 50%; height: 100%;
        background: linear-gradient(to right, transparent, rgba(255,255,255,0.08) 50%, transparent);
        transform: skewX(-25deg);
        transition: 0.75s;
        pointer-events: none;
      }
      .module-card:hover .shimmer { left: 150%; }

      /* Glow text */
      .glow-text {
        background: linear-gradient(to right, #818cf8, #c084fc, #fb7185);
        -webkit-background-clip: text;
        background-clip: text;
        color: transparent;
      }

      /* Ripple */
      .ripple {
        position: absolute;
        border-radius: 50%;
        transform: scale(0);
        animation: ripple-anim 0.6s linear;
        background-color: rgba(255,255,255,0.2);
        pointer-events: none;
        width: 80px; height: 80px;
        margin-left: -40px; margin-top: -40px;
      }
      @keyframes ripple-anim {
        to { transform: scale(4); opacity: 0; }
      }

      /* Loading overlay */
      #loader {
        display: none;
        position: fixed;
        inset: 0;
        background: rgba(2, 6, 23, 0.85);
        backdrop-filter: blur(8px);
        z-index: 1000;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        gap: 16px;
      }
      #loader p { color: #818cf8; font-size: 0.9rem; letter-spacing: 2px; text-transform: uppercase; }

      /* Module card */
      .module-card {
        cursor: pointer;
        border-radius: 1.25rem;
        background: rgba(15, 23, 42, 0.5);
        color: #e2e8f0;
        border: 1px solid rgba(255,255,255,0.07);
        position: relative;
        opacity: 1 !important;  /* Ensure visibility even if GSAP fails */
        overflow: hidden;
        text-align: left;
        padding: 28px 24px;
        transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        display: block;
        width: 100%;
      }
      .module-card:hover {
        background: rgba(15, 23, 42, 0.75);
        transform: translateY(-4px) scale(1.02);
      }
      .module-card:focus {
        outline: 2px solid #6366f1;
        outline-offset: 2px;
      }

      /* Icon container */
      .card-icon {
        width: 52px; height: 52px;
        border-radius: 14px;
        display: flex; align-items: center; justify-content: center;
        margin-bottom: 16px;
        transition: transform 0.3s;
      }
      .module-card:hover .card-icon { transform: scale(1.15) rotate(5deg); }

      .card-icon svg { width: 26px; height: 26px; }

      /* Status badge */
      .card-badge {
        font-size: 0.7rem;
        font-weight: 600;
        padding: 3px 8px;
        border-radius: 20px;
        letter-spacing: 0.5px;
        text-transform: uppercase;
      }

      /* Grid */
      .module-grid {
        width: 100%;
        max-width: 1100px;
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
        gap: 20px;
        position: relative;
        z-index: 10;
      }

      /* Header */
      .page-header {
        text-align: center;
        width: 100%;
        max-width: 700px;
        margin-bottom: 48px;
        position: relative;
        z-index: 10;
      }
      .page-header h1 {
        font-size: 2.8rem;
        font-weight: 800;
        margin: 0 0 12px;
        line-height: 1.1;
      }
      .page-header p {
        color: #64748b;
        font-size: 1.05rem;
        line-height: 1.6;
        margin: 0;
      }

      /* Arrow indicator */
      .card-arrow {
        position: absolute;
        right: 20px;
        top: 50%;
        transform: translateY(-50%);
        color: rgba(255,255,255,0.15);
        transition: all 0.3s;
      }
      .module-card:hover .card-arrow {
        color: rgba(255,255,255,0.5);
        right: 14px;
      }

      @media (max-width: 640px) {
        body { padding: 24px 16px 40px; }
        .page-header h1 { font-size: 2rem; }
        .module-grid { grid-template-columns: 1fr; }
      }
    </style>
  </head>

    <script>
      // Navigation with loading
      function navigate(route) {
        const loader = document.getElementById("loader");
        loader.style.display = "flex";
        setTimeout(() => {
          try { window.location.href = route; }
          catch (e) { loader.style.display = "none"; }
        }, 800);
      }

      // Ripple effect
      document.querySelectorAll(".module-card").forEach(card => {
        card.addEventListener("click", function(e) {
          const ripple = document.createElement("span");
          const rect = this.getBoundingClientRect();
          ripple.style.left = (e.clientX - rect.left) + "px";
          ripple.style.top = (e.clientY - rect.top) + "px";
          ripple.classList.add("ripple");
          this.appendChild(ripple);
          setTimeout(() => ripple.remove(), 700);
        });
      });

      // GSAP Animations (safe: set initial state first, then animate TO visible)
      try {
        // Set initial hidden state first
        gsap.set(".page-header", { opacity: 0, y: -30 });
        gsap.set(".top-nav", { opacity: 0, y: -20 });
        gsap.set(".module-card", { opacity: 0, y: 40 });

        // Animate TO visible state
        gsap.to(".page-header", { duration: 0.9, opacity: 1, y: 0, ease: "power3.out" });
        gsap.to(".top-nav", { duration: 0.7, opacity: 1, y: 0, ease: "power2.out" });
        gsap.to(".module-card", {
          duration: 0.6,
          y: 0,
          opacity: 1,
          stagger: 0.08,
          ease: "power3.out",
          delay: 0.2
        });
      } catch(e) {
        // If GSAP fails, force all elements visible
        console.warn('GSAP animation failed, showing elements:', e);
        document.querySelectorAll('.module-card, .page-header, .top-nav').forEach(el => {
          el.style.opacity = '1';
          el.style.transform = 'none';
        });
      }

      // Escape to cancel loading
      document.addEventListener("keydown", e => {
        if (e.key === "Escape") {
          document.getElementById("loader").style.display = "none";
        }
      });

      // SAFETY NET: Force all cards visible after 2 seconds, no matter what
      setTimeout(() => {
        document.querySelectorAll('.module-card, .page-header, .top-nav').forEach(el => {
          el.style.opacity = '1';
          el.style.transform = 'translateY(0)';
        });
      }, 2000);
    </script>
  </body>
</html>
