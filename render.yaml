services:
  - type: web
    name: infrabuild-ai
    runtime: python
    pythonVersion: 3.11
    
    # Build command - install dependencies
    buildCommand: "pip install -r requirements.txt"
    
    # Start command - run gunicorn with wsgi entry point
    startCommand: "gunicorn wsgi:app --bind 0.0.0.0:$PORT --workers 1"
    
    # Environment
    envVars:
      - key: FLASK_ENV
        value: production
      - key: PORT
        value: 8000
      # Add your API keys in Render dashboard:
      # - GROQ_API_KEY
      # - GITHUB_TOKEN
      # - FLASK_SECRET_KEY
